<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <style>
      .bg       { fill: #0d1117; }
      .card     { fill: #161b22; }
      .border   { fill: none; stroke: #30363d; stroke-width: 1; }
      .accent   { fill: none; stroke: #3fb950; stroke-width: 1.5; }
      .name     { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 32px; font-weight: 700; fill: #e6edf3; letter-spacing: -0.5px; }
      .tag      { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 11px; fill: #3fb950; letter-spacing: 2px; }
      .desc     { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; fill: #8b949e; }
      .desc-em  { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; fill: #e6edf3; font-weight: 600; }
      .cursor   { fill: #3fb950; animation: blink 1.2s step-end infinite; }
      .scanline { fill: none; stroke: #3fb950; stroke-width: 0.3; opacity: 0.06; }
      .glow-line { fill: none; stroke: #3fb950; stroke-width: 1; opacity: 0.4; }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
    </style>
    <!-- グロー用フィルター -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="200" class="bg"/>

  <!-- スキャンライン（横縞） -->
  <line x1="0" y1="20"  x2="800" y2="20"  class="scanline"/>
  <line x1="0" y1="40"  x2="800" y2="40"  class="scanline"/>
  <line x1="0" y1="60"  x2="800" y2="60"  class="scanline"/>
  <line x1="0" y1="80"  x2="800" y2="80"  class="scanline"/>
  <line x1="0" y1="100" x2="800" y2="100" class="scanline"/>
  <line x1="0" y1="120" x2="800" y2="120" class="scanline"/>
  <line x1="0" y1="140" x2="800" y2="140" class="scanline"/>
  <line x1="0" y1="160" x2="800" y2="160" class="scanline"/>
  <line x1="0" y1="180" x2="800" y2="180" class="scanline"/>

  <!-- カード -->
  <rect x="24" y="20" width="752" height="160" rx="6" class="card"/>
  <rect x="24" y="20" width="752" height="160" rx="6" class="border"/>

  <!-- コーナーアクセント（左上） -->
  <polyline points="24,44 24,20 48,20"   class="accent" filter="url(#glow-sm)"/>
  <!-- コーナーアクセント（右下） -->
  <polyline points="776,156 776,180 752,180" class="accent" filter="url(#glow-sm)"/>

  <!-- 左上ラベル -->
  <text x="36" y="15" class="tag">// PROFILE</text>

  <!-- グリーンのアクセントライン（左端） -->
  <line x1="24" y1="20" x2="24" y2="180" stroke="#3fb950" stroke-width="2" opacity="0.7" filter="url(#glow)"/>

  <!-- 名前 -->
  <text x="60" y="105" class="name" filter="url(#glow-sm)">akkey247</text>
  <!-- カーソル -->
  <rect x="246" y="80" width="3" height="30" class="cursor"/>

  <!-- 説明文 -->
  <text x="60" y="135">
    <tspan class="desc-em">Backend Engineer</tspan>
    <tspan class="desc"> · Building things with code.</tspan>
  </text>

  <!-- 右下ラベル -->
  <text x="740" y="192" class="tag" text-anchor="end" opacity="0.5">Gunma, Japan</text>

  <!-- 右側デコ：小さいドット群 -->
  <g opacity="0.35">
    <rect x="700" y="40"  width="6" height="6" rx="1" fill="#3fb950"/>
    <rect x="712" y="40"  width="6" height="6" rx="1" fill="#3fb950"/>
    <rect x="724" y="40"  width="6" height="6" rx="1" fill="#3fb950" opacity="0.5"/>
    <rect x="736" y="40"  width="6" height="6" rx="1" fill="#3fb950" opacity="0.2"/>
    <rect x="748" y="40"  width="6" height="6" rx="1" fill="#3fb950" opacity="0.1"/>
    <rect x="700" y="52"  width="6" height="6" rx="1" fill="#3fb950" opacity="0.5"/>
    <rect x="712" y="52"  width="6" height="6" rx="1" fill="#3fb950" opacity="0.3"/>
    <rect x="724" y="52"  width="6" height="6" rx="1" fill="#3fb950" opacity="0.6"/>
    <rect x="736" y="52"  width="6" height="6" rx="1" fill="#3fb950" opacity="0.2"/>
    <rect x="748" y="52"  width="6" height="6" rx="1" fill="#3fb950" opacity="0.4"/>
    <rect x="700" y="64"  width="6" height="6" rx="1" fill="#3fb950" opacity="0.2"/>
    <rect x="712" y="64"  width="6" height="6" rx="1" fill="#3fb950" opacity="0.5"/>
    <rect x="724" y="64"  width="6" height="6" rx="1" fill="#3fb950" opacity="0.1"/>
    <rect x="736" y="64"  width="6" height="6" rx="1" fill="#3fb950" opacity="0.7"/>
    <rect x="748" y="64"  width="6" height="6" rx="1" fill="#3fb950" opacity="0.3"/>
  </g>

</svg>