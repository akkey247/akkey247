<svg width="800" height="220" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .cursor { animation: blink 1.2s step-end infinite; }
  </style>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="hp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#238636"/>
    </linearGradient>
    <linearGradient id="mp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a371f7"/>
      <stop offset="100%" stop-color="#8957e5"/>
    </linearGradient>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="2" fill="transparent"/>
      <rect y="2" width="4" height="2" fill="#000" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" rx="12" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>
  <rect width="800" height="220" rx="12" fill="url(#scanlines)"/>

  <!-- Pixel dashed inner border -->
  <rect x="8" y="8" width="784" height="204" rx="6" fill="none" stroke="#21262d" stroke-width="1" stroke-dasharray="6,3"/>

  <!-- Pixel corner brackets -->
  <g fill="#58a6ff" opacity="0.35">
    <rect x="18" y="18" width="4" height="4"/><rect x="24" y="18" width="4" height="4"/><rect x="18" y="24" width="4" height="4"/>
    <rect x="774" y="18" width="4" height="4"/><rect x="780" y="18" width="4" height="4"/><rect x="780" y="24" width="4" height="4"/>
    <rect x="18" y="194" width="4" height="4"/><rect x="18" y="200" width="4" height="4"/><rect x="24" y="200" width="4" height="4"/>
    <rect x="780" y="194" width="4" height="4"/><rect x="774" y="200" width="4" height="4"/><rect x="780" y="200" width="4" height="4"/>
  </g>

  <!-- Terminal prompt with blinking cursor -->
  <text x="40" y="50" font-family="'Courier New',monospace" font-size="14" fill="#3fb950">&gt; hello_world</text>
  <rect class="cursor" x="150" y="37" width="8" height="15" fill="#3fb950"/>

  <!-- Player name -->
  <text x="400" y="98" text-anchor="middle" font-family="'Courier New',monospace" font-size="44" fill="#e6edf3" font-weight="bold" letter-spacing="6">akkey247</text>

  <!-- Decorative divider with diamond -->
  <line x1="230" y1="116" x2="385" y2="116" stroke="#30363d" stroke-width="1"/>
  <polygon points="400,111 406,116 400,121 394,116" fill="#58a6ff" opacity="0.7"/>
  <line x1="415" y1="116" x2="570" y2="116" stroke="#30363d" stroke-width="1"/>

  <!-- Class designation -->
  <text x="400" y="142" text-anchor="middle" font-family="'Courier New',monospace" font-size="13" fill="#7d8590" letter-spacing="4">SOFTWARE DEVELOPER</text>

  <!-- HP bar -->
  <g transform="translate(238, 160)">
    <text x="0" y="10" font-family="'Courier New',monospace" font-size="11" fill="#3fb950" font-weight="bold">HP</text>
    <rect x="24" y="1" width="100" height="10" rx="2" fill="#21262d"/>
    <rect x="24" y="1" width="100" height="10" rx="2" fill="url(#hp)" opacity="0.85"/>
    <text x="130" y="10" font-family="'Courier New',monospace" font-size="10" fill="#484f58">MAX</text>
  </g>

  <!-- MP bar -->
  <g transform="translate(410, 160)">
    <text x="0" y="10" font-family="'Courier New',monospace" font-size="11" fill="#a371f7" font-weight="bold">MP</text>
    <rect x="24" y="1" width="100" height="10" rx="2" fill="#21262d"/>
    <rect x="24" y="1" width="100" height="10" rx="2" fill="url(#mp)" opacity="0.85"/>
    <text x="130" y="10" font-family="'Courier New',monospace" font-size="10" fill="#484f58">MAX</text>
  </g>

  <!-- Tagline -->
  <text x="400" y="200" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#484f58">Ć Building things with code Ć</text>

  <!-- Pixel sparkles -->
  <g opacity="0.25">
    <rect x="700" y="42" width="3" height="3" fill="#e3b341"/>
    <rect x="730" y="60" width="2" height="2" fill="#58a6ff"/>
    <rect x="750" y="45" width="3" height="3" fill="#e3b341"/>
    <rect x="60" y="185" width="2" height="2" fill="#3fb950"/>
    <rect x="80" y="170" width="3" height="3" fill="#e3b341"/>
    <rect x="740" y="185" width="2" height="2" fill="#a371f7"/>
  </g>
</svg>
